<div
  x-data="createModal()"
  x-cloak
  @open-create-modal.window="openModal($event.detail)"
  @close-create-modal.window="closeModal()"
>
  <!-- Overlay -->
  <div
    x-show="isOpen"
    x-transition.opacity
    class="fixed inset-0 z-50 flex items-center justify-center p-4"
    @keydown.escape.window="closeModal()"
  >
    <!-- Backdrop -->
    <div class="glass absolute inset-0 bg-black/50" @click="closeModal()"></div>

    <!-- Modal panel -->
    <div
      class="relative w-full max-w-2xl rounded-2xl bg-pine-700 border border-pine-300/40 shadow-2xl"
      @click.stop
      x-transition
    >
      <div class="border-b border-[#4a5a4b]/50 px-6 py-4 flex items-center justify-between bg-pine-600/90 rounded-t-2xl">
        <h2 class="text-2xl font-bold text-white" x-text="modalTitle"></h2>
        <button class="text-white/70 cursor-pointer hover:bg-pine-600/50 rounded-lg pb-2 pl-3 pr-3 pt-1 hover:text-gold-300" type="button" @click="closeModal()">
          <ion-icon name="close" class="text-2xl"></ion-icon>
        </button>
      </div>
      <div id="modal-content" 
           class="max-h-[90vh] overflow-y-auto"
           hx-swap="innerHTML"
           x-ref="modalContent"
      >
        Loading...
      </div>
    </div>
  </div>
</div>
