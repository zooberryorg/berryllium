{% if existing_files %}
    <div class="px-6 mb-6">
        <p class="text-sm font-medium text-white/70 mb-2">Uploaded Files:</p>
        <div class="space-y-2">
            {% for file in existing_files %}
                <div class="flex items-center justify-between bg-white/5 border border-white/10 rounded-lg px-4 py-3">
                    <div class="flex items-center gap-3">
                        <ion-icon name="checkmark-circle" class="text-xl text-green-400"></ion-icon>
                        <div>
                            <p class="text-white text-sm font-medium">{{ file.filename }}</p>
                            <p class="text-white/50 text-xs">{{ file.size|filesizeformat }}</p>
                        </div>
                    </div>
                    <button type="button"
                            hx-post="{% url 'remove_temp_file' file.id %}"
                            hx-swap="innerHTML"
                            hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                            class="text-red-400 hover:text-red-300 p-1 cursor-pointer">
                        <ion-icon name="close-circle" class="text-xl align-middle"></ion-icon>
                    </button>
                </div>
            {% endfor %}
        </div>
    </div>
{% endif %}
