<!-- This partial depends on the fileInputProcessor existing in the x-data root located
 in mods/upload/step/2.html -->
{% if existing_files %}
    <div class="px-6 mb-6" x-ref="fileQueue">
        <p class="text-sm font-medium text-white/70 mb-2">Uploaded Files:</p>
        <div class="space-y-2">
            {% for file in existing_files %}
                <div data-file="{{ file.id }}"
                     class="flex items-center justify-between gap-2 w-full bg-pine-800/40 rounded-lg px-2 py-1 text-sm text-white/50 border border-pine-700/50 focus:ring-2 focus:ring-gold-500/50 focus:border-transparent hover:bg-pine-800">
                    <div class="flex items-center gap-3">
                        <ion-icon name="document" class="text-xl text-pine-100/50"></ion-icon>
                        <div>
                            <p class="text-white/70 text-sm font-medium">{{ file.filename }}</p>
                            <p class="text-white/50 text-xs">{{ file.size|filesizeformat }}</p>
                        </div>
                    </div>
                    <button type="button"
                            hx-post=""
                            hx-target="[data-file='{{ file.id }}']"
                            hx-swap="outerHTML"
                            @click="updateQueueState()"
                            hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                            class="zb-action-delete">
                        <ion-icon name="trash"></ion-icon>
                    </button>
                </div>
            {% endfor %}
        </div>
    </div>
{% endif %}
