{% for file_form in file_forms %}
    <div class="flex items-center gap-2 w-full bg-pine-800/40 rounded-lg px-2 py-1 text-sm text-white/80 border border-pine-700/50 focus:ring-2 focus:ring-gold-500/50 focus:border-transparent hover:bg-pine-800">
        <span class="text-pine-200 px-2 py-1 font-size-md">
            <ion-icon name="document"></ion-icon>
        </span>
        <input type="text"
            name="{{ file_form.prefix }}-title"
            class="text-white/80 px-2 py-1 bg-transparent border-none focus:outline-none w-full rounded-xl hover:bg-gold-400/10"
            placeholder="{{ file_form.filename }}"
            hx-post="{% url 'hx_validate_singlefile_title' file_id=file_form.instance.id %}" hx-trigger="input delay:500ms" hx-target="#group-name-errors" hx-swap="innerHTML" hx-on::after-swap="htmx.process(this)"
            {% if file_form.title != None %}value="{{ file_form.title }}"{% endif %}>
        <div class="text-red-500 text-sm" id="group-description-errors">
            {% if file_form.filename.errors %}{{ file_form.filename.errors|join:", " }}{% endif %}
        </div>
        <input type="text"
            name="{{ file_form.prefix }}-description"
            {% if file_form.description != None %}value="{{ file_form.description }}"{% endif %}
            class="px-2 py-1 text-sm text-white/80 focus:outline-none w-full rounded-xl hover:bg-gold-400/10"
            placeholder="File Description">
    </div>
{% endfor %}
