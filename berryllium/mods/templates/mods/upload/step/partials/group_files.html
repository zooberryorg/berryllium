{% for file in files %}
    {{ file.instance.title }}
    <div class="flex items-center gap-2 w-full bg-pine-800/40 rounded-lg px-2 py-1 text-sm text-white/80 border border-pine-700/50 focus:ring-2 focus:ring-gold-500/50 focus:border-transparent hover:bg-pine-800">
        <span class="text-pine-200 px-2 py-1 font-size-md">
            <ion-icon name="document"></ion-icon>
        </span>
        <div class="flex flex-col w-full">
            <input type="text"
                   name="fileform-{{ forloop.counter0 }}-title"
                   class="text-white/80 px-2 py-1 bg-transparent border-none focus:outline-none w-full rounded-xl hover:bg-gold-400/10"
                   placeholder="{{ file.instance.filename }}"
                   hx-post="{% url 'hx_validate_singlefile_title' file_id=file.instance.id prefix_id=forloop.counter0 %}"
                   hx-trigger="input delay:500ms"
                   hx-target="#file-title-errors-{{ forloop.counter0 }}"
                   hx-swap="innerHTML"
                   @keydown.escape="$el.blur()"
                   @keydown.enter.prevent="$el.blur()"
                   hx-on::after-swap="htmx.process(this)"
                   {% if file.instance.title != None %}value="{{ file.instance.title }}"{% endif %}>
            <div class="text-red-500 text-sm"
                 id="file-title-errors-{{ forloop.counter0 }}">
                {% if file.instance.filename.errors %}{{ file.instance.filename.errors|join:", " }}{% endif %}
            </div>
        </div>
        <div class="flex flex-col w-full">
            {# djlint:off #}
            <textarea type="text"
                x-data="textFieldExpand({ content: '{{ file.instance.description }}', ref: 'collapsibleSingleFileDesc' })"
                x-ref="collapsibleSingleFileDesc"
                x-init="$nextTick(() => updateTrimLength($refs.collapsibleSingleFileDesc.offsetWidth))"
                @focus="expand()"
                @blur="collapse(), updateTrimLength($el.offsetWidth), trimDisplayedContent()"
                :rows="focused ? 4 : 1"
                :class="focused ? 'h-32' : 'h-7'"
                @keydown.escape="$el.blur()"
                @keydown.enter.prevent="$el.blur()"
                :value="focused ? content : trimDisplayedContent()"
                @input="content = $el.value, updateTrimLength($el.offsetWidth)"
                name="fileform-{{ forloop.counter0 }}-description"
                {% if file.instance.description != None %}value="{{ file.instance.description }}"{% endif %}
                class="px-2 py-1 text-sm text-white/80 focus:outline-none w-full rounded-xl hover:bg-gold-400/10 transition-all duration-200 resize-none"
                placeholder="File Description"
                hx-post="{% url 'hx_validate_singlefile_description' file_id=file.instance.id prefix_id=forloop.counter0 %}"
                hx-trigger="input delay:500ms"
                hx-target="#file-description-errors-{{ forloop.counter0 }}"
                hx-swap="innerHTML"
                hx-on::after-swap="htmx.process(this)">
            </textarea>
            {# djlint:on #}
            <div class="text-red-500 text-sm"
                 id="file-description-errors-{{ forloop.counter0 }}">
                {% if file.instance.description.errors %}{{ file.instance.description.errors|join:", " }}{% endif %}
            </div>
        </div>
    </div>
{% endfor %}
