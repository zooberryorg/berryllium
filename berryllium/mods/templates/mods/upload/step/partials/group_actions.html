<button type="button"
        class="zb-action"
        hx-post="/mods/hx_move_filegroup_up/?current_index={{ forloop.counter0 }}"
        hx-trigger="click"
        hx-swap="#upload-frame">
    <ion-icon name="arrow-up"></ion-icon>
</button>
<button type="button"
        class="zb-action"
        hx-post="/mods/hx_move_filegroup_down/?current_index={{ forloop.counter0 }}"
        hx-trigger="click"
        hx-swap="#upload-frame">
    <ion-icon name="arrow-down"></ion-icon>
</button>
{% if file_groups|length > 1 %}
    <button type="button"
        class="zb-action-delete"
        hx-post="{% url 'hx_remove_filegroup_form' fg_id=group_id %}"
        hx-trigger="click"
        hx-swap="none"
        {# quick check for existing files before deletion #}
        {# djlint:off #}
        @click="
            const groupEl = document.querySelector('[data-group-id=\'{{ group_id }}\']');
            const fileCount = groupEl ? groupEl.querySelectorAll('[x-sort\\:item]').length : 0;
            $dispatch('group-was-deleted', { groupId: {{ group_id }}, wasEmpty: fileCount === 0 });
            setTimeout(() => {
                keepForm = false;
            }, 300);
        ">
        {# djlint:on #}
        <ion-icon name="trash"></ion-icon>
    </button>
{% endif %}
