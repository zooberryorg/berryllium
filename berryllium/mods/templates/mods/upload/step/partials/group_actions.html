<button type="button" class="zb-action">
    <ion-icon name="arrow-up"></ion-icon>
</button>
<button type="button" class="zb-action">
    <ion-icon name="arrow-down"></ion-icon>
</button>
{% if file_groups|length > 1 %}
    <button type="button"
            class="zb-action-delete"
            hx-post="{% url 'hx_remove_filegroup_form' fg_id=group_id %}"
            hx-swap="none"
            @click="keepForm = false">
        <ion-icon name="trash"></ion-icon>
    </button>
{% endif %}
