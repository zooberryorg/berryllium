<div class="relative flex flex-col gap-1 w-full">
    <div class="absolute top-0 right-0 flex items-center gap-1">
        <div class="flex items-center gap-1">{% include "mods/upload/step/partials/group_actions.html" %}</div>
        <div class="h-full"></div>
    </div>
    {{ group_formset.management_form }}
    <input type="text"
           name="group_name_{{ forloop.counter0 }}"
           value="{{ group.name }}"
           class="pl-2 py-1 mr-24 text-sm text-white/80 focus:outline-none min-w-0 rounded-xl hover:bg-gold-400/10"
           placeholder="Group Name">
    <input type="text"
           name="group_desc_{{ forloop.counter0 }}"
           value="{{ group.description }}"
           class="px-2 py-1 mt-2 text-sm text-white/80 focus:outline-none w-full rounded-xl hover:bg-gold-400/10"
           placeholder="Group Description">
</div>
