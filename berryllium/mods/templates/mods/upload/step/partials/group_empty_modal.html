<div id="empty-group-modal" class="flex flex-col items-center justify-center p-6 space-y-6 mt-6" x-data>
    <p class="mb-4">One or more empty groups were found. Do you want to discard them?</p>
    <div id="empty-group-actions">
        <button class="absolute inset-0 w-full h-full"
                @click="$dispatch('close-modal')"
               >Discard</button>
        <button class="absolute inset-0 w-full h-full"
                @click="$dispatch('close-modal'); $refs.uploadForm.submit()">Cancel</button>
    </div>
</div>
