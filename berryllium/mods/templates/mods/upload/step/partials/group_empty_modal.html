<div id="empty-group-modal"
     class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50">
    <div class="bg-white rounded-lg shadow-lg p-6 relative">
        <h2 class="text-xl font-semibold mb-4">Empty Group Detected</h2>
        <p class="mb-4">One or more empty groups were found. Do you want to discard them?</p>
    </div>
    <div id="empty-group-actions">
        <button class="absolute inset-0 w-full h-full"
                @click="$dispatch('close-modal')"
                x-text="Discard Empty Group(s)"></button>
        <button class="absolute inset-0 w-full h-full"
                @click="$dispatch('close-modal'); $refs.uploadForm.submit()"
                x-text="Keep Empty Group(s)"></button>
    </div>
</div>
