{% load static %}
{% load widget_tweaks %}
<template x-data="{ keepForm: true }" x-if="keepForm">
    <div class="px-6 mb-4">
        {# djlint:off #}
    <div class="flex flex-col items-center shadow-xs gap-2 
                mb-2 w-full bg-pine-800/40 rounded-lg px-2 pt-1 pb-2 
                text-sm text-white/80 border border-white/8 focus-within:ring-2 
                focus-within:ring-gold-500/50 focus-within:border-transparent">
        {# djlint:on #}
        <div class="flex items-center gap-2 w-full py-2">
            <div class="relative flex flex-col gap-1 w-full">
                <div class="absolute top-0 right-0 flex items-center gap-1">
                    <div class="flex items-center gap-1">
                        {% include "mods/upload/step/partials/group_actions.html" with group_id=group.instance.id %}
                    </div>
                    <div class="h-full"></div>
                </div>
                {% comment %} This is required because our form has id and order fields we need to render {% endcomment %}
                {% for hidden in group.hidden_fields %}{{ hidden }}{% endfor %}
                {% comment %} fileground url with file group id (not mod id) {% endcomment %}
                <input type="text"
                       name="form-{{ group.instance.id }}-name"
                       {% if group.instance.name != None %}value="{{ group.instance.name }}"{% endif %}
                       id="Group Name Title"
                       class="text-white/80 px-2 py-1 bg-transparent border-none focus:outline-none w-full rounded-xl hover:bg-gold-400/10"
                       placeholder="{{ group.instance.name }}"
                       hx-post="{% url 'hx_validate_filegroup_name' fg_id=group.instance.id %}"
                       hx-trigger="input delay:500ms"
                       hx-target="#group-name-errors-{{ group.instance.id }}"
                       hx-swap="innerHTML"
                       autocomplete="off"
                       @keydown.escape="$el.blur()"
                       @keydown.enter.prevent="$el.blur()"
                       hx-on::after-swap="htmx.process(this)">
                <div class="text-red-500 text-sm"
                     id="group-name-errors-{{ group.instance.id }}">
                    {% if group.name.errors %}{{ group.name.errors|join:", " }}{% endif %}
                </div>
                {# djlint:off #}
                <div x-data="textFieldExpand({ content: '{{ group.instance.description }}' })">
                    <textarea 
                        type="text"
                        name="form-{{ group.instance.id }}-description"
                        :value="focused ? content : trimDisplayedContent()"
                        {% if group.instance.description != None %}value="{{ group.instance.description }}"{% endif %}
                        class="px-2 py-1 text-sm text-white/80 focus:outline-none w-full rounded-xl hover:bg-gold-400/10 transition-all duration-200 resize-none"
                        placeholder="Group Description"

                        x-data="textFieldExpand({ content: '{{ group.instance.description }}', ref: 'collapsibleGroupDesc' })"
                        x-ref="collapsibleGroupDesc"
                        x-init="$nextTick(() => updateTrimLength($refs.collapsibleGroupDesc.offsetWidth))"

                        @focus="expand()"
                        @blur="collapse(), updateTrimLength($el.offsetWidth), trimDisplayedContent()"
                        @keydown.escape="$el.blur()"
                        @keydown.enter.prevent="$el.blur()"
                        @input="content = $el.value, updateTrimLength($el.offsetWidth)"

                        :rows="focused ? 4 : 1"
                        :class="focused ? 'h-15' : 'h-7'"
                        
                        hx-post="{% url 'hx_validate_filegroup_description' fg_id=group.instance.id %}"
                        hx-trigger="input delay:500ms"
                        hx-target="#group-description-errors-{{ group.instance.id }}"
                        hx-swap="innerHTML"
                        hx-on::after-swap="htmx.process(this)"></textarea>
                </div>
                {# djlint:on #}
                <div class="text-red-500 text-sm"
                     id="group-description-errors-{{ group.instance.id }}">
                    {% if group.description.errors %}{{ group.description.errors|join:", " }}{% endif %}
                    </div>
                    {% include "mods/upload/step/partials/group_files.html" with files=files group_index=group.instance.id %}
                </div>
            </div>
        </div>
    </div>
</div>
</template>
