<span class="font-semibold text-white"
      x-init="updateNavigation()">
      {{ title }}</span>
<div class="bg-pine-600/50 h-12 rounded-full mt-4 items-center flex overflow-hidden pl-4 pr-4">
    {% for step in completed %}
        <div class="bg-gold-400 h-2.5 rounded-full transition-all duration-500 ease-in-out mr-2 w-full w-1/4"></div>
    {% endfor %}
    {% for step in remaining %}<div class="bg-white/10 h-2.5 rounded-full w-full mr-2 w-1/4"></div>{% endfor %}
</div>
<script>
function updateNavigation() {
    return {
        const navLinks = document.querySelectorAll('[x-ref^="navLink-"]');
        navLinks.forEach((link, idx) => {
            if (idx < {{ current_index }}) {
                link.classList.add('bg-gold-400/30', 'text-white', 'border-gold-300/30');
            } else {
                link.classList.remove('bg-gold-400/30', 'text-white', 'border-gold-300/30');
            }
        });
    }
}
</script>
