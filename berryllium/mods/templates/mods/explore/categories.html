<script>
// Category selection tracking
document.addEventListener('DOMContentLoaded', function() {
    const categoryLinks = document.querySelectorAll('.glass a');
    
    categoryLinks.forEach(link => {
        link.addEventListener('click', function(e) {
            // Remove active state from all
            categoryLinks.forEach(l => {
                l.classList.remove('bg-gradient-to-r', 'from-amber-600/20', 'to-yellow-600/20', 'border-amber-600');
            });
            
            // Add active state to clicked
            this.classList.add('bg-gradient-to-r', 'from-amber-600/20', 'to-yellow-600/20', 'border-amber-600');
        });
    });
});
</script>
