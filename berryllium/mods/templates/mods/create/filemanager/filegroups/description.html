{# djlint:off #}
<div x-data="textFieldExpand({ content: '{{ group.instance.description }}' })">
    <textarea 
        type="text"
        name="form-{{ group.instance.id }}-description"
        :value="focused ? content : trimDisplayedContent()"
        {% if group.instance.description != None %}value="{{ group.instance.description }}"{% endif %}
        class="px-2 py-1 text-sm text-granite-200 focus:outline-none w-full rounded-xl hover:text-white focus:text-white transition-all duration-200 resize-none"
        placeholder="Group Description"

        x-data="textFieldExpand({ content: '{{ group.instance.description }}', ref: 'collapsibleGroupDesc' })"
        x-ref="collapsibleGroupDesc"
        x-init="$nextTick(() => updateTrimLength($refs.collapsibleGroupDesc.offsetWidth))"
        
        :rows="focused ? 4 : 1"
        :class="focused ? 'h-15' : 'h-7'"
        :class="$store.dnd.isDragging ? 'pointer-events-none' : ''"
        
        @focus="expand()"
        @blur="collapse(), updateTrimLength($el.offsetWidth), trimDisplayedContent()"
        @keydown.escape="$el.blur()"
        @keydown.enter.prevent="$el.blur()"
        @input="content = $el.value, updateTrimLength($el.offsetWidth)"

        hx-post="{% url 'hx_validate_filegroup_description' fg_id=group.instance.id %}"
        hx-trigger="input delay:500ms"
        hx-target="#group-description-errors-{{ group.instance.id }}"
        hx-swap="innerHTML"
        hx-on::after-swap="htmx.process(this)"></textarea>
</div>
{# djlint:on #}
